<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服中心 DNA 診斷問卷 — Jaya 城邦國際</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/diagnosis.css">
</head>
<body>

    <!-- Mobile Progress -->
    <div class="assess-mobile-progress">
        <a href="diagnosis.html" style="font-weight:700; color:var(--accent); font-size:14px; text-decoration:none; font-family:var(--font-en);">Jaya<span style="color:var(--accent)">.</span></a>
        <div class="assess-mobile-progress-bar">
            <div class="assess-mobile-progress-fill" id="mobileProgressFill"></div>
        </div>
        <span class="assess-mobile-progress-text" id="mobileProgressText">基本資料</span>
    </div>

    <div class="assess-wrapper">
        <!-- Sidebar -->
        <aside class="assess-sidebar">
            <div class="assess-sidebar-header">
                <div class="assess-logo">
                    <span>Jaya</span><span class="logo-dot">.</span>
                </div>
                <div class="assess-subtitle">客服中心 DNA 智慧診斷<br>共 26 題，約 15 分鐘</div>
            </div>

            <div class="assess-progress-bar">
                <div class="assess-progress-fill" id="progressFill"></div>
            </div>
            <div class="assess-progress-text" id="progressText">0 / 26 題</div>

            <nav class="assess-nav">
                <div class="assess-nav-item active" data-section="0">
                    <div class="assess-nav-dot"></div>
                    <div class="assess-nav-label">
                        <div class="assess-nav-title">基本資料</div>
                        <div class="assess-nav-count">公司與聯絡資訊</div>
                    </div>
                </div>
                <div class="assess-nav-item" data-section="1">
                    <div class="assess-nav-dot"></div>
                    <div class="assess-nav-label">
                        <div class="assess-nav-title">客服策略與治理</div>
                        <div class="assess-nav-count">Q1 – Q4</div>
                    </div>
                </div>
                <div class="assess-nav-item" data-section="2">
                    <div class="assess-nav-dot"></div>
                    <div class="assess-nav-label">
                        <div class="assess-nav-title">人員與組織</div>
                        <div class="assess-nav-count">Q5 – Q8</div>
                    </div>
                </div>
                <div class="assess-nav-item" data-section="3">
                    <div class="assess-nav-dot"></div>
                    <div class="assess-nav-label">
                        <div class="assess-nav-title">流程與品質</div>
                        <div class="assess-nav-count">Q9 – Q12</div>
                    </div>
                </div>
                <div class="assess-nav-item" data-section="4">
                    <div class="assess-nav-dot"></div>
                    <div class="assess-nav-label">
                        <div class="assess-nav-title">技術與平台</div>
                        <div class="assess-nav-count">Q13 – Q17</div>
                    </div>
                </div>
                <div class="assess-nav-item" data-section="5">
                    <div class="assess-nav-dot"></div>
                    <div class="assess-nav-label">
                        <div class="assess-nav-title">通路與客戶體驗</div>
                        <div class="assess-nav-count">Q18 – Q22</div>
                    </div>
                </div>
                <div class="assess-nav-item" data-section="6">
                    <div class="assess-nav-dot"></div>
                    <div class="assess-nav-label">
                        <div class="assess-nav-title">數據與 AI 應用</div>
                        <div class="assess-nav-count">Q23 – Q26</div>
                    </div>
                </div>
            </nav>

            <div class="assess-actions">
                <button class="btn btn-secondary" id="btnPrev" style="display:none;">← 上一步</button>
                <button class="btn btn-primary" id="btnNext">下一步 →</button>
                <button class="btn btn-primary" id="btnSubmit" style="display:none;">完成診斷 →</button>
            </div>
        </aside>

        <!-- Main Content (dynamically rendered by diagnosis.js) -->
        <main class="assess-main">
            <!-- Sections injected here by JS -->
        </main>
    </div>

    <script src="js/diagnosis.js"></script>
    <script>
        // Show/hide prev/next/submit buttons based on section
        function updateButtons() {
            const prev = document.getElementById('btnPrev');
            const next = document.getElementById('btnNext');
            const submit = document.getElementById('btnSubmit');
            if (!prev || !next || !submit) return;

            prev.style.display = currentSection > 0 ? '' : 'none';
            const isLast = currentSection === SECTIONS.length - 1;
            next.style.display = isLast ? 'none' : '';
            submit.style.display = isLast ? '' : 'none';
        }

        // Override goToSection to also update buttons
        const origGoTo = goToSection;
        goToSection = function(idx) {
            origGoTo(idx);
            updateButtons();
        };

        document.addEventListener('DOMContentLoaded', updateButtons);
    </script>
</body>
</html>

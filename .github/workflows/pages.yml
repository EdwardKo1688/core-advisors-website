name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect web files
        run: |
          mkdir -p _site
          # Copy web files (HTML, JS, CSS, JSON, images, fonts)
          rsync -av --progress \
            --include="*.html" \
            --include="*.js" \
            --include="*.css" \
            --include="*.json" \
            --include="*.png" \
            --include="*.jpg" \
            --include="*.jpeg" \
            --include="*.gif" \
            --include="*.svg" \
            --include="*.ico" \
            --include="*.webp" \
            --include="*.woff" \
            --include="*.woff2" \
            --include="*.ttf" \
            --include="*.txt" \
            --include="*.xml" \
            --include="*.webmanifest" \
            --include=".nojekyll" \
            --include="*/" \
            --exclude="*" \
            . _site/
          # Remove unwanted directories from _site
          rm -rf _site/_site _site/.git _site/.github _site/.claude \
                 _site/node_modules _site/openspec _site/deploy
          echo "=== Files in _site root ==="
          ls -la _site/
          echo "=== IC diagnostic files ==="
          ls -la _site/ic-diagnostic* || echo "No ic-diagnostic files found"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

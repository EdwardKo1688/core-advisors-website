<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後台管理 | 核心顧問有限公司</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-login">
        <div class="login-card">
            <a href="index.html" class="logo">
                <span class="logo-icon">C</span>
                <span class="logo-text">核心顧問</span>
            </a>
            <h2>後台管理系統</h2>
            <p class="login-subtitle">請輸入管理員帳號與密碼</p>
            <form onsubmit="event.preventDefault(); alert('此為展示頁面，後台功能尚未啟用。');">
                <div class="form-group">
                    <label for="username">帳號</label>
                    <input type="text" id="username" placeholder="請輸入帳號" required>
                </div>
                <div class="form-group">
                    <label for="password">密碼</label>
                    <input type="password" id="password" placeholder="請輸入密碼" required>
                </div>
                <button type="submit" class="login-btn">登入</button>
            </form>
            <div class="login-footer">
                <a href="index.html">← 返回首頁</a>
            </div>
        </div>
    </div>
</body>
</html>

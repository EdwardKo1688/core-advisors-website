<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芯科大・芯知識 — IC 通路產業 AI 賦能學習平台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans TC',sans-serif;background:#f9fafb;color:#111827}
button{cursor:pointer;font-family:inherit}
textarea{font-family:inherit}
.hide{display:none!important}

/* Role Selector */
.role-bg{min-height:100vh;background:linear-gradient(135deg,#f0f9ff,#e0e7ff);display:flex;align-items:center;justify-content:center;padding:24px}
.role-box{max-width:640px;width:100%}
.role-title{font-size:32px;font-weight:700;text-align:center;margin-bottom:4px;color:#1B3A5C}
.role-sub{color:#6b7280;text-align:center;margin-bottom:40px;font-size:14px;font-weight:500}
.role-prompt{text-align:center;color:#374151;font-weight:500;margin-bottom:24px}
.role-btn{display:flex;align-items:center;gap:16px;padding:20px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;width:100%;text-align:left;margin-bottom:12px;transition:all .2s}
.role-btn:hover{border-color:#bfdbfe;box-shadow:0 4px 12px rgba(27,58,92,.1)}
.role-icon{font-size:36px}
.role-label{font-weight:700;font-size:18px}
.role-desc{font-size:14px;color:#6b7280}

/* Top Bar */
.topbar{background:#fff;border-bottom:2px solid #1B3A5C;padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{font-size:20px;font-weight:700;color:#1B3A5C}
.topbar-sublogo{font-size:12px;color:#2563eb;font-weight:600;margin-left:4px}
.topbar-name{font-size:14px;font-weight:500;color:#374151;margin-left:8px}
.topbar-switch{font-size:14px;color:#6b7280;background:none;border:none}

/* Nav */
.nav{display:flex;overflow-x:auto;border-bottom:1px solid #e5e7eb;background:#fff;position:sticky;top:0;z-index:10}
.nav-btn{display:flex;align-items:center;gap:6px;padding:12px 16px;font-size:14px;font-weight:500;white-space:nowrap;border:none;background:none;border-bottom:2px solid transparent;color:#6b7280;transition:all .2s}
.nav-btn.active{border-bottom-color:#2563eb;color:#2563eb}

/* Layout */
.page{padding:24px;max-width:900px;margin:0 auto}
.page-sm{padding:24px;max-width:640px;margin:0 auto}

/* Hero */
.hero{background:linear-gradient(to right,#1B3A5C,#2563eb);border-radius:16px;padding:32px;color:#fff;margin-bottom:32px}
.hero-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.hero-icon{font-size:28px}
.hero-title{font-size:24px;font-weight:700}
.hero-desc{color:#bfdbfe;margin-bottom:24px}
.hero-score{background:rgba(255,255,255,.2);border-radius:8px;padding:8px 16px;display:inline-block}
.hero-btn{background:#fff;color:#2563eb;font-weight:600;padding:10px 24px;border-radius:8px;border:none;font-size:14px}

/* Quick Links */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.quick-card{padding:16px;border-radius:12px;text-align:center;border:none;font-size:14px;font-weight:500}
.quick-icon{font-size:24px;margin-bottom:4px}

/* Skill bars */
.skill-panel{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:24px}
.skill-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.skill-name{width:100px;font-size:13px;font-weight:500;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.skill-track{flex:1;background:#f3f4f6;border-radius:999px;height:12px;overflow:hidden}
.skill-fill{height:100%;border-radius:999px;transition:width .5s}
.skill-val{width:40px;text-align:right;font-size:13px;font-weight:600;color:#4b5563}

/* Cards */
.card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:20px;margin-bottom:12px}
.card-click{cursor:pointer;transition:box-shadow .2s}
.card-click:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}

/* Three Stages Cards */
.stages-grid{display:grid;grid-template-columns:1fr;gap:20px;margin-bottom:32px}
.stage-card{background:#fff;border-radius:16px;border:2px solid;padding:28px;position:relative;overflow:hidden}
.stage-card::before{content:'';position:absolute;top:0;right:0;width:120px;height:120px;opacity:.1;border-radius:50%;z-index:0}
.stage-content{position:relative;z-index:1}
.stage-icon{font-size:40px;margin-bottom:12px}
.stage-title{font-size:22px;font-weight:700;margin-bottom:4px}
.stage-subtitle{font-size:14px;margin-bottom:16px;font-weight:500}
.stage-bullets{margin-top:12px}
.stage-bullet{display:flex;gap:8px;margin-bottom:8px;font-size:14px;line-height:1.5}
.stage-bullet-icon{flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center}

/* Assessment */
.assess-progress{width:100%;background:#e5e7eb;border-radius:999px;height:8px;margin-bottom:32px}
.assess-fill{background:#2563eb;height:8px;border-radius:999px;transition:width .3s}
.score-grid{display:flex;justify-content:center;gap:12px;margin-bottom:24px}
.score-btn{width:56px;height:56px;border-radius:12px;font-size:18px;font-weight:700;border:none;transition:all .2s}
.score-btn.active{background:#2563eb;color:#fff;transform:scale(1.1);box-shadow:0 4px 12px rgba(37,99,235,.3)}
.score-btn.inactive{background:#f3f4f6;color:#4b5563}
.score-labels{display:flex;justify-content:space-between;font-size:12px;color:#9ca3af;padding:0 8px;margin-bottom:32px}
.btn-row{display:flex;gap:12px;justify-content:center}
.btn-primary{padding:10px 24px;background:#2563eb;color:#fff;border-radius:8px;border:none;font-size:14px}
.btn-primary:disabled{background:#93c5fd;cursor:not-allowed}
.btn-success{padding:10px 24px;background:#10B981;color:#fff;border-radius:8px;border:none;font-size:14px}
.btn-success:disabled{background:#6ee7b7;cursor:not-allowed}
.btn-secondary{padding:10px 24px;background:#f3f4f6;color:#374151;border-radius:8px;border:none;font-size:14px}

/* Report */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
.gap-box{display:flex;align-items:flex-start;gap:12px;padding:12px;background:#fef2f2;border-radius:8px;margin-bottom:8px}
.gap-badge{background:#fee2e2;color:#dc2626;font-size:12px;font-weight:700;padding:4px 8px;border-radius:4px;white-space:nowrap}
.suggest-box{margin-top:16px;padding:12px;background:#eff6ff;border-radius:8px}

/* Filter */
.filter-row{display:flex;gap:8px;margin-bottom:24px}
.filter-btn{padding:6px 16px;border-radius:999px;font-size:14px;font-weight:500;border:none}
.filter-btn.active{background:#111827;color:#fff}
.filter-btn.inactive{background:#f3f4f6;color:#4b5563}

/* Knowledge */
.know-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.know-card{border-radius:12px;border:2px solid;padding:20px;cursor:pointer;transition:box-shadow .2s}
.know-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.know-badge{font-size:12px;font-weight:700;padding:2px 8px;border-radius:4px}

/* Templates */
.tpl-card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:20px;display:flex;align-items:flex-start;gap:16px}
.tpl-icon{font-size:28px}
.tpl-tag{font-size:12px;background:#f3f4f6;color:#4b5563;padding:2px 8px;border-radius:4px}

/* Dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.dash-card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:16px;text-align:center}
.dash-label{font-size:14px;color:#6b7280;margin-bottom:4px}
.dash-value{font-size:28px;font-weight:700}
.dash-unit{font-size:14px;font-weight:400;color:#9ca3af;margin-left:4px}

/* Bar chart CSS */
.bar-row{display:flex;align-items:center;margin-bottom:8px}
.bar-label{width:80px;font-size:11px;color:#6b7280;text-align:right;padding-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;position:relative;height:24px;background:#f3f4f6;border-radius:4px;overflow:hidden}
.bar-fill{position:absolute;top:0;left:0;height:100%;background:#3b82f6;border-radius:4px;transition:width .5s}
.bar-target{position:absolute;top:0;left:0;height:100%;border:2px dashed #d1d5db;border-radius:4px}
.bar-val{width:36px;text-align:right;font-size:12px;font-weight:600;color:#374151;margin-left:8px}

/* Practice */
.prac-header{background:linear-gradient(to right,#f59e0b,#ef4444);padding:16px 24px;border-radius:12px 12px 0 0}
.diff-badge{font-size:12px;font-weight:700;padding:4px 8px;border-radius:4px}
.hint-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.hint-box{border-radius:8px;padding:16px;border:1px solid}
.hint-item{font-size:13px;display:flex;gap:8px;margin-bottom:6px}

/* Coach box */
.coach-box{background:linear-gradient(to right,#eef2ff,#eff6ff);border-radius:12px;border:1px solid #c7d2fe;padding:24px}
.coach-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.coach-item{background:rgba(255,255,255,.7);border-radius:8px;padding:12px;font-size:14px;color:#312e81;font-weight:500}

/* Radar SVG */
.radar-wrap{display:flex;justify-content:center;margin:16px 0}

/* Level badges */
.level-badge{font-size:12px;font-weight:500;padding:4px 10px;border-radius:999px}

/* Footer */
.footer-text{text-align:center;color:#9ca3af;font-size:13px;margin-top:32px;padding-top:24px;border-top:1px solid #e5e7eb}

/* Responsive */
@media(max-width:768px){
  .quick-grid{grid-template-columns:repeat(2,1fr)}
  .report-grid,.know-grid,.hint-grid,.coach-grid{grid-template-columns:1fr}
  .dash-grid{grid-template-columns:repeat(2,1fr)}
  .stages-grid{grid-template-columns:1fr}
}
</style>
</head>

// ===== HELPERS =====
function h(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) for (var k in attrs) {
    if (k === 'className') el.className = attrs[k];
    else if (k === 'onclick') el.onclick = attrs[k];
    else if (k === 'oninput') el.oninput = attrs[k];
    else if (k === 'disabled') { if (attrs[k]) el.disabled = true; }
    else if (k === 'innerHTML') el.innerHTML = attrs[k];
    else if (k === 'value') el.value = attrs[k];
    else if (k === 'placeholder') el.placeholder = attrs[k];
    else if (k === 'rows') el.rows = attrs[k];
    else if (k === 'style') el.style.cssText = attrs[k];
    else el.setAttribute(k, attrs[k]);
  }
  if (typeof children === 'string') el.textContent = children;
  else if (Array.isArray(children)) children.forEach(function(c) { if (c) el.appendChild(c); });
  else if (children instanceof HTMLElement) el.appendChild(children);
  return el;
}

function radarSVG(data, size) {
  size = size || 240;
  var cx = size/2, cy = size/2, maxR = size*0.38, n = data.length;
  var step = 2*Math.PI/n;
  function pt(i,v,mx){var a=-Math.PI/2+i*step,r=(v/(mx||5))*maxR;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}
  var svg = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg">';
  [1,2,3,4,5].forEach(function(lv){
    var pts=data.map(function(_,i){var p=pt(i,lv);return p.x+','+p.y;}).join(' ');
    svg+='<polygon points="'+pts+'" fill="none" stroke="#e5e7eb" stroke-width="1"/>';
  });
  data.forEach(function(_,i){var p=pt(i,5);svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p.x+'" y2="'+p.y+'" stroke="#e5e7eb" stroke-width="1"/>';});
  var poly=data.map(function(d,i){var p=pt(i,d.score);return p.x+','+p.y;}).join(' ');
  svg+='<polygon points="'+poly+'" fill="rgba(59,130,246,0.25)" stroke="#3b82f6" stroke-width="2"/>';
  data.forEach(function(d,i){var p=pt(i,d.score);svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="#3b82f6"/>';});
  data.forEach(function(d,i){var p=pt(i,6.2);svg+='<text x="'+p.x+'" y="'+p.y+'" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#374151">'+d.skill+'</text>';});
  svg+='</svg>';
  return svg;
}

function update(changes) {
  for (var k in changes) state[k] = changes[k];
  render();
}

}

        ]),
        h('span',{className:'level-badge',style:'background:'+lvlBg(sc)+';color:'+lvlFg(sc)},lvl(sc)+' ('+sc+'/5)')
      ]),
      h('p',{style:'font-size:13px;color:#6b7280;margin-left:40px;margin-bottom:8px'},s.desc)
    ];
    if(sc<4) els.push(h('div',{style:'margin-left:40px;font-size:14px'},[h('span',{style:'color:#2563eb;font-weight:500'},'推薦課程：'),h('span',{},rec)]));
    return h('div',{className:'card'},els);
  });

  return h('div',{className:'page-sm'},[
    h('h2',{style:'font-size:24px;font-weight:700;margin-bottom:8px'},'個人學習路徑'),
    h('p',{style:'color:#6b7280;margin-bottom:24px'},'根據你的能力診斷結果，為你規劃最佳學習順序'),
    h('div',{},items)
  ]);
}

function renderPractice() {
  var scenarios=SCENARIOS[state.role]||[];
  function dc(d){return d==='初級'?{bg:'#dcfce7',fg:'#166534'}:d==='中級'?{bg:'#fef9c3',fg:'#854d0e'}:{bg:'#fee2e2',fg:'#991b1b'};}

  if(state.practiceSelected!==null){
    var sc=scenarios[state.practiceSelected];var c=dc(sc.difficulty);
    var hintSection=[];
    if(state.practiceShowHints){
      hintSection.push(h('div',{className:'hint-grid'},[
        h('div',{className:'hint-box',style:'background:#fefce8;border-color:#fde68a'},[
          h('h5',{style:'font-weight:700;color:#92400e;margin-bottom:8px'},'思考提示'),
          h('div',{},sc.hints.map(function(x){return h('div',{className:'hint-item',style:'color:#a16207'},[h('span',{},'💡'),h('span',{},x)]);}))
        ]),
        h('div',{className:'hint-box',style:'background:#f0fdf4;border-color:#bbf7d0'},[
          h('h5',{style:'font-weight:700;color:#166534;margin-bottom:8px'},'評估標準'),
          h('div',{},sc.evaluation.map(function(x){return h('div',{className:'hint-item',style:'color:#15803d'},[h('span',{},'✅'),h('span',{},x)]);}))
        ])
      ]));
    }

    return h('div',{className:'page-sm'},[
      h('button',{style:'color:#2563eb;background:none;border:none;font-size:14px;margin-bottom:16px;cursor:pointer',onclick:function(){update({practiceSelected:null,practiceShowHints:false,practiceAnswer:''});}},'\u2190 返回案例列表'),
      h('div',{style:'background:#fff;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden'},[
        h('div',{className:'prac-header'},[
          h('span',{className:'diff-badge',style:'background:'+c.bg+';color:'+c.fg},sc.difficulty),
          h('h3',{style:'font-size:20px;font-weight:700;color:#fff;margin-top:8px'},sc.title)
        ]),
        h('div',{style:'padding:24px'},[
          h('h4',{style:'font-weight:700;margin-bottom:8px'},'情境描述'),
          h('p',{style:'color:#374151;background:#f9fafb;padding:16px;border-radius:8px;font-size:14px;line-height:1.7;margin-bottom:20px'},sc.situation),
          h('h4',{style:'font-weight:700;margin-bottom:8px'},'你的任務'),
          h('p',{style:'color:#1d4ed8;background:#eff6ff;padding:16px;border-radius:8px;font-weight:500;margin-bottom:20px'},sc.task),
          h('h4',{style:'font-weight:700;margin-bottom:8px'},'你的回答'),
          h('textarea',{style:'width:100%;border:1px solid #d1d5db;border-radius:8px;padding:16px;font-size:14px;outline:none;resize:vertical',rows:8,placeholder:'在這裡寫下你的策略方案...',value:state.practiceAnswer,oninput:function(e){state.practiceAnswer=e.target.value;}}),
          h('div',{style:'margin-top:16px'},[
            h('button',{style:'color:#d97706;font-weight:500;font-size:14px;background:none;border:none;cursor:pointer',onclick:function(){update({practiceShowHints:!state.practiceShowHints})}},state.practiceShowHints?'隱藏提示與評估標準':'需要提示？點這裡 →')
          ]),
          h('div',{},hintSection)
        ])
      ])
    ]);
  }

  if(scenarios.length===0) return h('div',{className:'page-sm'},[h('p',{style:'color:#9ca3af'},'此角色的案例正在開發中...')]);

  return h('div',{className:'page-sm'},[
    h('h2',{style:'font-size:24px;font-weight:700;margin-bottom:8px'},'案例模擬練習'),
    h('p',{style:'color:#6b7280;margin-bottom:24px'},'選擇一個情境，練習你的策略思維與方法論應用'),
    h('div',{},scenarios.map(function(sc,i){
      var c=dc(sc.difficulty);
      return h('button',{className:'card card-click',style:'display:block;width:100%;text-align:left;border:1px solid #e5e7eb;cursor:pointer',onclick:function(){update({practiceSelected:i,practiceShowHints:false,practiceAnswer:''})}},[
        h('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:8px'},[
          h('h3',{style:'font-weight:700'},sc.title),
          h('span',{className:'diff-badge',style:'background:'+c.bg+';color:'+c.fg+';border-radius:999px;padding:4px 10px'},sc.difficulty)
        ]),
        h('p',{style:'font-size:14px;color:#6b7280',className:'line-clamp-2'},sc.situation)
      ]);
    }))
  ]);
}

function renderKnowledge() {
  var cats=['all','CRM','SCM','管理'];
  var colorMap={blue:{border:'#bfdbfe',bg:'#eff6ff',badge:'#dbeafe',badgeFg:'#1d4ed8'},green:{border:'#bbf7d0',bg:'#f0fdf4',badge:'#dcfce7',badgeFg:'#15803d'},purple:{border:'#e9d5ff',bg:'#faf5ff',badge:'#f3e8ff',badgeFg:'#7e22ce'}};
  var filtered=state.knowledgeFilter==='all'?KNOWLEDGE_CARDS:KNOWLEDGE_CARDS.filter(function(c){return c.category===state.knowledgeFilter;});

  return h('div',{className:'page'},[
    h('h2',{style:'font-size:24px;font-weight:700;margin-bottom:8px'},'知識卡片庫'),
    h('p',{style:'color:#6b7280;margin-bottom:16px'},'世界級 CRM / SCM / 管理方法論速查'),
    h('div',{className:'filter-row'},cats.map(function(c){
      return h('button',{className:'filter-btn '+(state.knowledgeFilter===c?'active':'inactive'),onclick:function(){update({knowledgeFilter:c,knowledgeExpanded:null})}},c==='all'?'全部':c);
    })),
    h('div',{className:'know-grid'},filtered.map(function(card,i){
      var cm=colorMap[card.color];
      var els=[
        h('span',{className:'know-badge',style:'background:'+cm.badge+';color:'+cm.badgeFg},card.category),
        h('h3',{style:'font-size:18px;font-weight:700;margin-top:8px'},card.title),
        h('p',{style:'font-size:14px;color:#6b7280;margin-bottom:8px'},card.subtitle)
      ];
      if(state.knowledgeExpanded===i) els.push(h('p',{style:'font-size:14px;color:#374151;margin-top:12px;padding-top:12px;border-top:1px solid #d1d5db;line-height:1.6'},card.content));
      els.push(h('span',{style:'font-size:12px;color:#9ca3af;display:block;margin-top:8px'},state.knowledgeExpanded===i?'點擊收合':'點擊展開'));
      return h('div',{className:'know-card',style:'border-color:'+cm.border+';background:'+cm.bg,onclick:function(){update({knowledgeExpanded:state.knowledgeExpanded===i?null:i})}},els);
    }))
  ]);
}

function renderTemplates() {
  var cats=['all','CRM','SCM','管理'];
  var filtered=state.templateFilter==='all'?TEMPLATES:TEMPLATES.filter(function(t){return t.category===state.templateFilter;});

  return h('div',{className:'page'},[
    h('h2',{style:'font-size:24px;font-weight:700;margin-bottom:8px'},'範本與模板下載'),
    h('p',{style:'color:#6b7280;margin-bottom:16px'},'即學即用的實戰工具，可直接應用到工作中'),
    h('div',{className:'filter-row'},cats.map(function(c){
      return h('button',{className:'filter-btn '+(state.templateFilter===c?'active':'inactive'),onclick:function(){update({templateFilter:c})}},c==='all'?'全部':c);
    })),
    h('div',{className:'know-grid'},filtered.map(function(t){
      return h('div',{className:'tpl-card'},[
        h('span',{className:'tpl-icon'},t.icon),
        h('div',{style:'flex:1'},[
          h('h3',{style:'font-weight:700'},t.name),
          h('p',{style:'font-size:14px;color:#6b7280;margin-bottom:12px'},t.desc),
          h('span',{className:'tpl-tag'},t.category)
        ])
      ]);
    })),
    h('div',{style:'margin-top:32px;padding:20px;background:#eff6ff;border-radius:12px;border:1px solid #bfdbfe;text-align:center'},[
      h('p',{style:'color:#1e40af;font-weight:500'},'需要客製化的範本或特定格式？'),
      h('p',{style:'font-size:14px;color:#2563eb;margin-top:4px'},'直接在 Claude 對話中告訴我：「幫我製作 MEDDIC 評分卡的 Excel 範本」，我會立即為你產出！')
    ])
  ]);
}

function renderDashboard() {
  var skills=SKILL_TREES[state.role]||[];
  var vals=Object.values(state.scores);
  var hasScores=vals.length>0;
  var avg=hasScores?(vals.reduce(function(a,b){return a+b},0)/vals.length):0;
  var strong=skills.filter(function(s){return(state.scores[s.id]||0)>=4}).length;
  var weak=skills.filter(function(s){return(state.scores[s.id]||0)<3&&state.scores[s.id]}).length;
  var pct=hasScores?Math.round(Object.keys(state.scores).length/skills.length*100):0;

  var cards=[
    {label:'綜合評分',value:hasScores?avg.toFixed(1):'—',unit:'/5',color:'#2563eb'},
    {label:'優勢能力',value:strong,unit:'項',color:'#10B981'},
    {label:'待加強',value:weak,unit:'項',color:'#dc2626'},
    {label:'完成度',value:pct,unit:'%',color:'#7c3aed'}
  ];

  var barEls=hasScores?[h('div',{className:'card',style:'padding:24px;margin-bottom:32px'},[
    h('h3',{style:'font-weight:700;margin-bottom:16px'},'能力 vs 目標對比'),
    h('div',{},skills.map(function(s){
      var sc=state.scores[s.id]||0;
      var nm=s.name.length>8?s.name.slice(0,8)+'..':s.name;
      return h('div',{className:'bar-row'},[
        h('div',{className:'bar-label'},nm),
        h('div',{className:'bar-track'},[
          h('div',{className:'bar-fill',style:'width:'+sc/5*100+'%'}),
          h('div',{className:'bar-target',style:'width:80%'})
        ]),
        h('div',{className:'bar-val'},sc+'/5')
      ]);
    })),
    h('div',{style:'display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:12px;color:#6b7280'},[
      h('span',{innerHTML:'<span style="display:inline-block;width:12px;height:12px;background:#3b82f6;border-radius:2px;margin-right:4px;vertical-align:middle"></span>分數'}),
      h('span',{innerHTML:'<span style="display:inline-block;width:12px;height:12px;border:2px dashed #d1d5db;border-radius:2px;margin-right:4px;vertical-align:middle"></span>目標'})
    ])
  ])]:[];

  var coachItems=['「我想練習用 SPIN 拜訪一個車用電子客戶」','「幫我分析這個客戶的 MEDDIC 評分」','「我的庫存週轉天數是65天，怎麼改善？」','「幫我設計一個業務團隊的季度培訓計畫」','「我想練習跟原廠做 QBR 簡報」','「客戶要求降價5%，怎麼談判？」'];

  return h('div',{className:'page'},[
    h('h2',{style:'font-size:24px;font-weight:700;margin-bottom:24px'},'學習儀表板'),
    h('div',{className:'dash-grid'},cards.map(function(c){
      return h('div',{className:'dash-card'},[
        h('div',{className:'dash-label'},c.label),
        h('div',{className:'dash-value',style:'color:'+c.color},[
          document.createTextNode(String(c.value)),
          h('span',{className:'dash-unit'},c.unit)
        ])
      ]);
    })),
    h('div',{},barEls),
    h('div',{className:'coach-box'},[
      h('h3',{style:'font-weight:700;color:#312e81;margin-bottom:12px'},'芯知識 AI 教練互動建議'),
      h('p',{style:'font-size:14px;color:#4338ca;margin-bottom:4px'},'芯科大的 AI 助理團隊隨時為你服務'),
      h('p',{style:'font-size:13px;color:#4338ca;margin-bottom:16px'},'你可以隨時在 Claude 對話中跟 AI 教練互動，例如：'),
      h('div',{className:'coach-grid'},coachItems.map(function(q){return h('div',{className:'coach-item'},q);}))
    ])
  ]);
}

// ===== INIT =====
render();
</script>
</body>
</html>

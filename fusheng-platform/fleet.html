<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車隊入口 | 富昇智慧物流平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/portal.css">
</head>
<body data-page="fleet">

    <!-- ============ Login Screen ============ -->
    <div id="loginScreen" class="portal-login">
        <div class="portal-login-card">
            <div class="portal-login-logo">富昇智慧物流</div>
            <div class="portal-login-subtitle">FuSheng Smart Logistics</div>
            <h2 class="portal-login-title">車隊/司機登入</h2>
            <form id="loginForm" class="portal-login-form" autocomplete="off">
                <div class="form-group">
                    <label for="loginPassword">密碼</label>
                    <input type="password" id="loginPassword" placeholder="請輸入密碼" required>
                </div>
                <button type="submit" class="portal-login-btn">登入</button>
                <div id="loginError" class="portal-login-error">密碼錯誤，請重新輸入</div>
            </form>
            <a href="index.html" class="portal-login-back">&larr; 返回首頁</a>
        </div>
    </div>

    <!-- ============ Portal App ============ -->
    <div id="portalApp" class="portal-app">

        <!-- Overlay for mobile -->
        <div id="portalOverlay" class="portal-overlay"></div>

        <!-- Sidebar -->
        <aside id="portalSidebar" class="portal-sidebar">
            <div class="portal-sidebar-brand">
                <h2>富昇物流</h2>
                <span>車隊中心</span>
            </div>
            <nav class="portal-sidebar-nav">
                <div class="portal-nav-item active" data-view="dashboard">
                    <span class="nav-icon">&#9633;</span> 任務總覽
                </div>
                <div class="portal-nav-item" data-view="accept">
                    <span class="nav-icon">&#128203;</span> 接單管理
                </div>
                <div class="portal-nav-item" data-view="execution">
                    <span class="nav-icon">&#128666;</span> 任務執行
                </div>
                <div class="portal-nav-item" data-view="performance">
                    <span class="nav-icon">&#128200;</span> 績效統計
                </div>
                <div class="portal-nav-divider"></div>
                <a href="index.html" class="portal-nav-item">
                    <span class="nav-icon">&#8592;</span> 返回首頁
                </a>
                <div class="portal-nav-item" id="logoutBtn">
                    <span class="nav-icon">&#9211;</span> 登出
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="portal-main">
            <header class="portal-header">
                <div class="portal-header-left">
                    <button id="hamburgerBtn" class="portal-hamburger">&#9776;</button>
                    <h1 id="headerTitle" class="portal-header-title">任務總覽</h1>
                </div>
                <div class="portal-header-user">
                    <span>車隊帳號</span>
                    <div class="user-avatar">車</div>
                </div>
            </header>
            <main id="portalContent" class="portal-content">
                <!-- Dynamic content rendered here -->
            </main>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toastNotification" style="position:fixed;bottom:24px;right:24px;background:#0f172a;color:#fff;padding:14px 24px;border-radius:8px;font-size:0.9rem;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:9999;transform:translateY(100px);opacity:0;transition:all 0.3s ease;pointer-events:none;"></div>

    <script src="js/api-config.js"></script>
    <script src="js/fleet.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶案例 | 富昇智慧物流平台</title>
<meta name="description" content="富昇智慧物流平台客戶成功案例 - 電商平台、品牌零售、製造業等多元產業的物流升級實績。">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cases">

<header class="navbar" id="navbar"></header>

<main>
  <!-- Hero -->
  <section class="svc-hero">
    <div class="svc-hero-bg">
      <div class="container">
        <div class="svc-hero-content fade-in">
          <span class="hero-label">Success Stories</span>
          <h1 class="svc-hero-title">客戶成功案例</h1>
          <p class="svc-hero-desc">從電商平台到製造業，看看各行各業如何透過富昇智慧物流平台實現物流升級與成本優化。</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Filter + Cases -->
  <section class="section" id="cases">
    <div class="container">
      <div class="section-header fade-in">
        <span class="label">案例總覽</span>
        <h2>合作實績</h2>
        <p>精選客戶合作案例，展示我們的服務成果</p>
      </div>

      <!-- Filter Tabs -->
      <div class="filter-tabs fade-in" id="filterTabs">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="電商平台">電商平台</button>
        <button class="filter-btn" data-filter="品牌零售">品牌零售</button>
        <button class="filter-btn" data-filter="製造業">製造業</button>
      </div>

      <!-- Case Cards Grid -->
      <div class="case-grid" id="caseGrid"></div>
    </div>
  </section>

  <!-- CTA -->
  <section class="section cta-section">
    <div class="container text-center">
      <div class="cta-content fade-in">
        <h2>想成為下一個成功案例？</h2>
        <p>立即與我們聯繫，讓專業團隊為您量身打造物流解決方案</p>
        <div class="hero-actions" style="justify-content:center">
          <a href="inquiry.html" class="btn btn-white btn-lg">立即詢價</a>
          <a href="services.html" class="btn btn-secondary btn-lg">了解服務</a>
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="footer" id="footer"></footer>

<script src="js/api-config.js"></script>
<script src="js/main.js"></script>

<!-- Cases Page Logic -->
<script>
(function() {
  const cases = (typeof DEMO_DATA !== 'undefined' && DEMO_DATA.cases) ? DEMO_DATA.cases : [];
  const grid = document.getElementById('caseGrid');
  const filterTabs = document.getElementById('filterTabs');

  function renderCases(filter) {
    const filtered = filter === 'all' ? cases : cases.filter(c => c.industry === filter);
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="case-empty">目前沒有符合條件的案例</div>';
      return;
    }
    grid.innerHTML = filtered.map(c => `
      <div class="case-card fade-in" data-id="${c.id}" data-industry="${c.industry}">
        <div class="case-card-header" onclick="toggleCase(${c.id})">
          <div class="case-logo">${c.logo}</div>
          <div class="case-card-info">
            <span class="case-tag">${c.industry}</span>
            <h3 class="case-title">${c.title}</h3>
            <span class="case-service">${c.service}</span>
          </div>
          <div class="case-toggle-icon">▾</div>
        </div>
        <div class="case-card-body" id="caseBody-${c.id}">
          <div class="case-detail-row">
            <div class="case-detail-block">
              <h4>挑戰</h4>
              <p>${c.challenge}</p>
            </div>
            <div class="case-detail-block">
              <h4>解決方案</h4>
              <p>${c.solution}</p>
            </div>
          </div>
          <div class="case-results">
            <h4>成果</h4>
            <ul class="case-results-list">
              ${c.results.map(r => `<li>${r}</li>`).join('')}
            </ul>
          </div>
        </div>
      </div>
    `).join('');
  }

  // Toggle expand/collapse
  window.toggleCase = function(id) {
    const body = document.getElementById('caseBody-' + id);
    const card = body.closest('.case-card');
    const isOpen = card.classList.contains('expanded');
    // Close all
    document.querySelectorAll('.case-card.expanded').forEach(el => el.classList.remove('expanded'));
    // Open clicked if was closed
    if (!isOpen) card.classList.add('expanded');
  };

  // Filter click
  filterTabs.addEventListener('click', function(e) {
    if (!e.target.classList.contains('filter-btn')) return;
    filterTabs.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderCases(e.target.dataset.filter);
  });

  // Initial render
  renderCases('all');
})();
</script>

<style>
/* Service Detail Hero */
.svc-hero { padding-top: 68px; }
.svc-hero-bg {
  background: linear-gradient(135deg, #0f172a 0%, #0c2d4a 50%, #0f172a 100%);
  padding: 80px 0 60px; position: relative; overflow: hidden;
}
.svc-hero-bg::before {
  content: ''; position: absolute; top: -30%; right: -10%; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(59,130,246,.12) 0%, transparent 70%); pointer-events: none;
}
.svc-hero-bg::after {
  content: ''; position: absolute; bottom: -20%; left: -8%; width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(16,185,129,.08) 0%, transparent 70%); pointer-events: none;
}
.svc-hero-content { position: relative; z-index: 1; max-width: 660px; }
.svc-hero .hero-label {
  display: inline-block; font-size: .78rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: .12em; color: #3b82f6; margin-bottom: 16px;
  padding: 5px 14px; background: rgba(59,130,246,.12); border-radius: 20px;
}
.svc-hero-title { font-size: 2.8rem; font-weight: 900; color: #fff; margin-bottom: 16px; }
.svc-hero-desc { font-size: 1.1rem; color: rgba(255,255,255,.7); line-height: 1.8; margin-bottom: 32px; }

/* Filter Tabs */
.filter-tabs {
  display: flex; gap: 12px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap;
}
.filter-btn {
  padding: 10px 24px; border-radius: 24px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-sec); font-size: .88rem; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.filter-btn:hover {
  border-color: #3b82f6; color: #3b82f6;
}
.filter-btn.active {
  background: #3b82f6; color: #fff; border-color: #3b82f6;
}

/* Case Grid */
.case-grid {
  display: flex; flex-direction: column; gap: 20px;
}

/* Case Card */
.case-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  overflow: hidden; transition: var(--transition);
}
.case-card:hover { box-shadow: var(--shadow-xl); }
.case-card-header {
  display: flex; align-items: center; gap: 20px; padding: 24px 28px; cursor: pointer;
  transition: background .2s;
}
.case-card-header:hover { background: rgba(59,130,246,.03); }
.case-logo {
  width: 56px; height: 56px; border-radius: 14px; background: rgba(59,130,246,.08);
  display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0;
}
.case-card-info { flex: 1; min-width: 0; }
.case-tag {
  display: inline-block; font-size: .72rem; font-weight: 600; padding: 3px 10px;
  background: rgba(59,130,246,.1); color: #3b82f6; border-radius: 12px; margin-bottom: 6px;
}
.case-title { font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.case-service { font-size: .82rem; color: var(--text-sec); }
.case-toggle-icon {
  font-size: 1.2rem; color: var(--text-sec); transition: transform .3s; flex-shrink: 0;
}
.case-card.expanded .case-toggle-icon { transform: rotate(180deg); }

/* Case Body (collapsed by default) */
.case-card-body {
  max-height: 0; overflow: hidden; transition: max-height .4s ease, padding .3s ease;
  padding: 0 28px;
}
.case-card.expanded .case-card-body {
  max-height: 500px; padding: 0 28px 28px;
}

.case-detail-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 20px;
  padding-top: 20px; border-top: 1px solid var(--border);
}
.case-detail-block h4 {
  font-size: .82rem; font-weight: 700; color: #3b82f6; text-transform: uppercase;
  letter-spacing: .06em; margin-bottom: 8px;
}
.case-detail-block p { font-size: .9rem; color: var(--text-sec); line-height: 1.7; }

.case-results h4 {
  font-size: .82rem; font-weight: 700; color: #10b981; text-transform: uppercase;
  letter-spacing: .06em; margin-bottom: 12px;
}
.case-results-list {
  list-style: none; padding: 0; margin: 0; display: flex; gap: 16px; flex-wrap: wrap;
}
.case-results-list li {
  font-size: .88rem; color: var(--text); font-weight: 600; padding: 8px 16px;
  background: rgba(16,185,129,.08); border-radius: 8px; border: 1px solid rgba(16,185,129,.15);
}

/* Case Empty */
.case-empty {
  text-align: center; padding: 60px 20px; color: var(--text-sec); font-size: 1rem;
}

/* CTA Section */
.cta-section {
  background: linear-gradient(135deg, #0f172a, #1e3a5f); color: #fff; padding: 80px 0;
}
.cta-content h2 { font-size: 2rem; font-weight: 800; margin-bottom: 12px; }
.cta-content p { font-size: 1.05rem; color: rgba(255,255,255,.7); margin-bottom: 32px; }
.hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }

@media (max-width: 768px) {
  .svc-hero-title { font-size: 2rem; }
  .svc-hero-desc { font-size: .95rem; }
  .svc-hero-bg { padding: 50px 0 40px; }
  .case-card-header { flex-wrap: wrap; gap: 12px; padding: 20px; }
  .case-detail-row { grid-template-columns: 1fr; gap: 16px; }
  .case-results-list { flex-direction: column; }
  .filter-tabs { gap: 8px; }
  .filter-btn { padding: 8px 16px; font-size: .82rem; }
  .cta-content h2 { font-size: 1.5rem; }
}
</style>
</body>
</html>

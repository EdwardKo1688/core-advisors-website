<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上詢價 | 富昇智慧物流平台</title>
<meta name="description" content="富昇智慧物流平台線上詢價與聯繫，快速獲取 S90 小件、中大型配送、專車棧板與第三地出貨的即時報價。">
<link rel="stylesheet" href="css/style.css">
<style>
  /* Hero - Small Blue Gradient */
  .inquiry-hero {
    background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #3b82f6 100%);
    padding: 100px 0 48px;
    text-align: center;
    color: #fff;
  }
  .inquiry-hero h1 {
    font-size: 2.2rem;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -.02em;
  }
  .inquiry-hero p {
    font-size: 1.05rem;
    opacity: .8;
  }

  /* Form Layout */
  .inquiry-section {
    padding: 48px 0 80px;
  }
  .inquiry-wrapper {
    max-width: 720px;
    margin: 0 auto;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* Price Estimate Area */
  .price-estimate {
    background: var(--surface-alt);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    text-align: center;
    margin-bottom: 24px;
    transition: var(--transition);
  }
  .price-estimate.has-estimate {
    background: rgba(59,130,246,.05);
    border-color: var(--accent);
    border-style: solid;
  }
  .estimate-placeholder {
    color: var(--text-muted);
    font-size: .95rem;
  }
  .estimate-label {
    font-size: .82rem;
    font-weight: 600;
    color: var(--text-sec);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .estimate-price {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--accent-dark);
    margin-bottom: 4px;
  }
  .estimate-note {
    font-size: .78rem;
    color: var(--text-muted);
  }

  /* Success Confirmation */
  .success-box {
    display: none;
    text-align: center;
    padding: 48px 24px;
    background: var(--success-light);
    border-radius: var(--radius-lg);
    border: 1px solid var(--success);
  }
  .success-box .success-icon {
    font-size: 3rem;
    margin-bottom: 16px;
  }
  .success-box h3 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }
  .success-box p {
    color: var(--text-sec);
    margin-bottom: 8px;
  }
  .success-box .inquiry-id {
    display: inline-block;
    background: #fff;
    padding: 8px 20px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--accent-dark);
    border: 1px solid var(--border);
    margin-top: 8px;
  }

  @media (max-width: 640px) {
    .form-row {
      grid-template-columns: 1fr;
    }
    .inquiry-hero h1 {
      font-size: 1.6rem;
    }
    .estimate-price {
      font-size: 1.3rem;
    }
  }
</style>
</head>
<body data-page="inquiry">

<header class="navbar" id="navbar"></header>

<main>
  <!-- Hero -->
  <section class="inquiry-hero">
    <div class="container">
      <h1>線上詢價</h1>
      <p>快速獲取運費預估，專人即時回覆</p>
    </div>
  </section>

  <!-- Inquiry Section -->
  <section class="inquiry-section">
    <div class="container">
      <div class="inquiry-wrapper">
        <!-- Tab Switcher -->
        <div class="tabs">
          <button class="tab-btn active" data-tab="tab-inquiry">詢價表單</button>
          <button class="tab-btn" data-tab="tab-contact">一般聯繫</button>
        </div>

        <!-- Tab 1: 詢價表單 -->
        <div class="tab-content active" id="tab-inquiry">
          <div id="inquiryForm">
            <!-- Service Type -->
            <div class="form-group">
              <label class="form-label" for="serviceType">服務類型 <span style="color:var(--danger)">*</span></label>
              <select class="form-select" id="serviceType">
                <option value="">請選擇服務類型</option>
                <option value="S90小件">S90 小件配送</option>
                <option value="1.9噸配送">1.9 噸配送</option>
                <option value="3.5噸配送">3.5 噸配送</option>
                <option value="專車棧板">專車棧板</option>
                <option value="第三地出貨">第三地出貨</option>
              </select>
              <div class="form-error">請選擇服務類型</div>
            </div>

            <!-- Price Estimate -->
            <div class="price-estimate" id="priceEstimate">
              <span class="estimate-placeholder">請選擇服務類型以查看預估價格</span>
            </div>

            <!-- Addresses -->
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="fromAddress">取件地址 <span style="color:var(--danger)">*</span></label>
                <input type="text" class="form-input" id="fromAddress" placeholder="例：台北市信義區松仁路100號">
                <div class="form-error">請輸入取件地址</div>
              </div>
              <div class="form-group">
                <label class="form-label" for="toAddress">送達地址 <span style="color:var(--danger)">*</span></label>
                <input type="text" class="form-input" id="toAddress" placeholder="例：新北市板橋區中山路50號">
                <div class="form-error">請輸入送達地址</div>
              </div>
            </div>

            <!-- Cargo Description -->
            <div class="form-group">
              <label class="form-label" for="cargoDesc">貨物說明</label>
              <textarea class="form-textarea" id="cargoDesc" placeholder="請描述貨物內容、重量、件數等資訊"></textarea>
            </div>

            <!-- Date & Time -->
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="expectedDate">預期日期</label>
                <input type="date" class="form-input" id="expectedDate">
              </div>
              <div class="form-group">
                <label class="form-label" for="expectedTime">預期時段</label>
                <select class="form-select" id="expectedTime">
                  <option value="不限">不限</option>
                  <option value="上午">上午</option>
                  <option value="下午">下午</option>
                </select>
              </div>
            </div>

            <!-- Contact Info -->
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="contactName">聯絡人 <span style="color:var(--danger)">*</span></label>
                <input type="text" class="form-input" id="contactName" placeholder="您的姓名">
                <div class="form-error">請輸入聯絡人姓名</div>
              </div>
              <div class="form-group">
                <label class="form-label" for="contactPhone">電話 <span style="color:var(--danger)">*</span></label>
                <input type="tel" class="form-input" id="contactPhone" placeholder="例：0912-345-678">
                <div class="form-error">請輸入聯絡電話</div>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="contactEmail">Email</label>
              <input type="email" class="form-input" id="contactEmail" placeholder="example@email.com">
            </div>

            <!-- Submit -->
            <button class="btn btn-primary btn-lg" id="inquirySubmitBtn" style="width:100%">送出詢價</button>
          </div>

          <!-- Success Confirmation -->
          <div class="success-box" id="inquirySuccess">
            <div class="success-icon">✅</div>
            <h3>詢價已送出！</h3>
            <p>我們將於一個工作日內回覆您的報價，請留意您的電話與信箱。</p>
            <p>您的詢價編號：</p>
            <span class="inquiry-id" id="inquiryIdDisplay"></span>
          </div>
        </div>

        <!-- Tab 2: 一般聯繫 -->
        <div class="tab-content" id="tab-contact">
          <div id="contactForm">
            <div class="form-group">
              <label class="form-label" for="contactFormName">姓名 <span style="color:var(--danger)">*</span></label>
              <input type="text" class="form-input" id="contactFormName" placeholder="您的姓名">
              <div class="form-error">請輸入姓名</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="contactFormEmail">Email <span style="color:var(--danger)">*</span></label>
              <input type="email" class="form-input" id="contactFormEmail" placeholder="example@email.com">
              <div class="form-error">請輸入 Email</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="contactFormSubject">主旨 <span style="color:var(--danger)">*</span></label>
              <input type="text" class="form-input" id="contactFormSubject" placeholder="聯繫主旨">
              <div class="form-error">請輸入主旨</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="contactFormMessage">訊息內容 <span style="color:var(--danger)">*</span></label>
              <textarea class="form-textarea" id="contactFormMessage" placeholder="請輸入您的訊息"></textarea>
              <div class="form-error">請輸入訊息內容</div>
            </div>
            <button class="btn btn-primary btn-lg" id="contactSubmitBtn" style="width:100%">送出訊息</button>
          </div>

          <!-- Success Confirmation -->
          <div class="success-box" id="contactSuccess">
            <div class="success-icon">✅</div>
            <h3>訊息已送出！</h3>
            <p>感謝您的來信，我們將儘快回覆您。</p>
          </div>
        </div>

      </div>
    </div>
  </section>
</main>

<footer class="footer" id="footer"></footer>

<script src="js/api-config.js"></script>
<script src="js/inquiry.js"></script>
<script src="js/main.js"></script>
</body>
</html>

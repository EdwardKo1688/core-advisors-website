<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>營運管理 | 富昇智慧物流平台</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body data-page="admin">

  <!-- ===== Login Screen ===== -->
  <div class="admin-login" id="adminLogin">
    <div class="admin-login-card">
      <div class="login-icon">🔐</div>
      <h2>營運管理後台</h2>
      <p class="login-subtitle">富昇智慧物流平台 管理中心</p>
      <div class="login-field">
        <label for="adminPassword">管理密碼</label>
        <input type="password" id="adminPassword" placeholder="請輸入管理密碼">
      </div>
      <div class="login-error" id="loginError">密碼錯誤，請重新輸入</div>
      <button class="btn-login" id="btnLogin">登入管理後台</button>
      <a href="index.html" class="login-back">← 返回首頁</a>
    </div>
  </div>

  <!-- ===== Admin App ===== -->
  <div class="admin-app" id="adminApp" style="display:none">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-brand">
        <h2>富昇智慧物流</h2>
        <span class="brand-subtitle">營運管理中心</span>
      </div>
      <nav class="admin-sidebar-nav">
        <div class="nav-item active" data-view="dashboard">
          <span class="nav-icon">📊</span> 儀表板
        </div>
        <div class="nav-item" data-view="orders">
          <span class="nav-icon">📋</span> 訂單管理
        </div>
        <div class="nav-item" data-view="fleet">
          <span class="nav-icon">🚛</span> 車隊管理
        </div>
        <div class="nav-item" data-view="kpi">
          <span class="nav-icon">📈</span> KPI追蹤
        </div>
        <div class="nav-item" data-view="customers">
          <span class="nav-icon">👥</span> 客戶管理
        </div>
        <div class="nav-divider"></div>
        <a class="nav-item" href="index.html">
          <span class="nav-icon">🏠</span> 返回首頁
        </a>
        <div class="nav-item" id="btnLogout">
          <span class="nav-icon">🚪</span> 登出
        </div>
      </nav>
    </aside>

    <!-- Main -->
    <div class="admin-main">
      <header class="admin-header">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="admin-sidebar-toggle" id="sidebarToggle">☰</button>
          <span class="admin-header-title" id="headerTitle">儀表板</span>
        </div>
        <div class="admin-header-user">
          <div>
            <div class="user-name">管理員</div>
            <div class="user-role">營運管理</div>
          </div>
          <div class="user-avatar">管</div>
        </div>
      </header>
      <div class="admin-content" id="adminContent">
        <!-- Dynamic content rendered here -->
      </div>
    </div>
  </div>

  <!-- ===== Modal Overlay ===== -->
  <div class="admin-modal-overlay" id="modalOverlay">
    <div class="admin-modal" id="modalContainer">
      <!-- Modal content rendered dynamically -->
    </div>
  </div>

  <script src="js/api-config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貨主入口 | 富昇智慧物流平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/portal.css">
</head>
<body data-page="shipper">

    <!-- ============ Login Screen ============ -->
    <div id="loginScreen" class="portal-login">
        <div class="portal-login-card">
            <div class="portal-login-logo">富昇智慧物流</div>
            <div class="portal-login-subtitle">FuSheng Smart Logistics</div>
            <h2 class="portal-login-title">貨主登入</h2>
            <form id="loginForm" class="portal-login-form" autocomplete="off">
                <div class="form-group">
                    <label for="loginPassword">密碼</label>
                    <input type="password" id="loginPassword" placeholder="請輸入密碼" required>
                </div>
                <button type="submit" class="portal-login-btn">登入</button>
                <div id="loginError" class="portal-login-error">密碼錯誤，請重新輸入</div>
            </form>
            <a href="index.html" class="portal-login-back">&larr; 返回首頁</a>
        </div>
    </div>

    <!-- ============ Portal App ============ -->
    <div id="portalApp" class="portal-app">

        <!-- Overlay for mobile -->
        <div id="portalOverlay" class="portal-overlay"></div>

        <!-- Sidebar -->
        <aside id="portalSidebar" class="portal-sidebar">
            <div class="portal-sidebar-brand">
                <h2>富昇物流</h2>
                <span>貨主中心</span>
            </div>
            <nav class="portal-sidebar-nav">
                <div class="portal-nav-item active" data-view="dashboard">
                    <span class="nav-icon">&#9633;</span> 儀表板
                </div>
                <div class="portal-nav-item" data-view="inquiry">
                    <span class="nav-icon">&#36;&#36;</span> 即時詢價
                </div>
                <div class="portal-nav-item" data-view="booking">
                    <span class="nav-icon">&#128203;</span> 預約配送
                </div>
                <div class="portal-nav-item" data-view="tracking">
                    <span class="nav-icon">&#128666;</span> 訂單追蹤
                </div>
                <div class="portal-nav-item" data-view="history">
                    <span class="nav-icon">&#128196;</span> 歷史紀錄
                </div>
                <div class="portal-nav-divider"></div>
                <a href="index.html" class="portal-nav-item">
                    <span class="nav-icon">&#8592;</span> 返回首頁
                </a>
                <div class="portal-nav-item" id="logoutBtn">
                    <span class="nav-icon">&#9211;</span> 登出
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="portal-main">
            <header class="portal-header">
                <div class="portal-header-left">
                    <button id="hamburgerBtn" class="portal-hamburger">&#9776;</button>
                    <h1 id="headerTitle" class="portal-header-title">儀表板</h1>
                </div>
                <div class="portal-header-user">
                    <span>貨主帳號</span>
                    <div class="user-avatar">貨</div>
                </div>
            </header>
            <main id="portalContent" class="portal-content">
                <!-- Dynamic content rendered here -->
            </main>
        </div>
    </div>

    <script src="api-config.js"></script>
    <script src="js/shipper.js"></script>
</body>
</html>

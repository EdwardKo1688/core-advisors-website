<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; }
body { width: 1200px; height: 630px; overflow: hidden; background: #0a1628; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

const W = 1200, H = 630;

// ── Background ──────────────────────────────────────────────
const bg = ctx.createLinearGradient(0, 0, W, H);
bg.addColorStop(0, '#0a1628');
bg.addColorStop(1, '#0d1f3c');
ctx.fillStyle = bg;
ctx.fillRect(0, 0, W, H);

// ── Subtle grid ──────────────────────────────────────────────
ctx.strokeStyle = 'rgba(255,255,255,0.04)';
ctx.lineWidth = 1;
for (let x = 0; x <= W; x += 60) {
  ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
}
for (let y = 0; y <= H; y += 60) {
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
}

// ── Gold accent bar (left) ──────────────────────────────────
ctx.fillStyle = '#b8960c';
ctx.fillRect(72, 100, 4, 320);

// ── Teal dot ────────────────────────────────────────────────
ctx.fillStyle = '#00d4aa';
ctx.beginPath();
ctx.arc(76, 420, 6, 0, Math.PI * 2);
ctx.fill();

// ── Brand mark (top-left square) ────────────────────────────
const bx = 100, by = 110, bs = 52;
ctx.fillStyle = '#b8960c';
ctx.fillRect(bx, by, bs, bs);
ctx.fillStyle = '#0a1628';
ctx.font = 'bold 28px Inter, sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('C', bx + bs / 2, by + bs / 2);

// ── Main title ──────────────────────────────────────────────
ctx.textAlign = 'left';
ctx.textBaseline = 'alphabetic';

ctx.fillStyle = '#ffffff';
ctx.font = 'bold 72px "Noto Sans TC", "PingFang TC", sans-serif';
ctx.fillText('核心顧問', 100, 240);

ctx.fillStyle = '#b8960c';
ctx.font = '600 36px Inter, sans-serif';
ctx.fillText('Core Advisors', 104, 290);

// ── Divider ──────────────────────────────────────────────────
ctx.strokeStyle = 'rgba(255,255,255,0.15)';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(100, 320);
ctx.lineTo(620, 320);
ctx.stroke();

// ── Tagline ─────────────────────────────────────────────────
ctx.fillStyle = 'rgba(255,255,255,0.85)';
ctx.font = '400 32px "Noto Sans TC", "PingFang TC", sans-serif';
ctx.fillText('AI 轉型  ×  數位營運顧問', 100, 370);

// ── Three pillars ────────────────────────────────────────────
const pillars = ['AI 導入診斷', '顧問服務', '工具落地'];
const colors  = ['#00d4aa',   '#b8960c',  '#ffffff'];
pillars.forEach((p, i) => {
  const px = 100 + i * 200;
  ctx.fillStyle = colors[i];
  ctx.font = 'bold 20px "Noto Sans TC", "PingFang TC", sans-serif';
  ctx.fillText('● ' + p, px, 430);
});

// ── URL (bottom) ─────────────────────────────────────────────
ctx.fillStyle = 'rgba(255,255,255,0.35)';
ctx.font = '400 18px Inter, sans-serif';
ctx.fillText('edwardko1688.github.io/core-advisors-website', 100, 570);

// ── Right decorative element ─────────────────────────────────
// Large teal circle (partial, right edge)
ctx.strokeStyle = 'rgba(0,212,170,0.12)';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.arc(1100, 315, 260, 0, Math.PI * 2);
ctx.stroke();

ctx.strokeStyle = 'rgba(0,212,170,0.07)';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.arc(1100, 315, 180, 0, Math.PI * 2);
ctx.stroke();

// Gold ring
ctx.strokeStyle = 'rgba(184,150,12,0.20)';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.arc(1100, 315, 110, 0, Math.PI * 2);
ctx.stroke();

// Center icon
ctx.fillStyle = 'rgba(184,150,12,0.15)';
ctx.beginPath();
ctx.arc(1100, 315, 50, 0, Math.PI * 2);
ctx.fill();

ctx.fillStyle = '#b8960c';
ctx.font = 'bold 36px Inter, sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('AI', 1100, 315);

// ── Export ───────────────────────────────────────────────────
window._pngData = c.toDataURL('image/png');
document.title = 'READY';
</script>
</body>
</html>

.section-desc{font-size:8.5px;color:var(--gray);margin-bottom:8px}

.prompt-card{background:var(--card2);border-radius:7px;padding:8px;border-top:2px solid}

.prompt-card .pd{font-size:7px;color:var(--gray);line-height:1.5}

.modal h3{font-size:12px;font-weight:700;margin:14px 0 6px;padding-bottom:3px;border-bottom:1px solid var(--gray-dk)}

function openDetail(title, color, detail) {
  document.getElementById('modalBody').innerHTML = `
    <h2 style="color:${color}">${title}</h2>
    <h3 style="color:${color}">🗣️ 白話解釋</h3>
    <p>${detail.plain}</p>
    <h3 style="color:${color}">📌 為什麼重要</h3>
    <p>${detail.why}</p>
    <h3 style="color:${color}">🏢 企業應用</h3>
    <p>${detail.biz}</p>
    <h3 style="color:${color}">👔 C-Level 決策要點</h3>
    <p style="color:${color};font-weight:700">${detail.clevel}</p>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

let ttsOn=false,ttsI=0,ttsFV=null;
function findFV(){const v=speechSynthesis.getVoices();const p=[v=>v.lang.includes('zh-TW')&&/female|美|雅|慧|小/i.test(v.name),v=>v.lang.includes('zh-TW'),v=>v.lang.includes('zh')];for(const f of p){const r=v.find(f);if(r)return r;}return null;}
speechSynthesis.onvoiceschanged=()=>{ttsFV=findFV();};ttsFV=findFV();
function ttsSay(txt,cb){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.lang='zh-TW';u.rate=1;u.pitch=1.1;if(ttsFV)u.voice=ttsFV;u.onend=cb;u.onerror=cb;speechSynthesis.speak(u);}
function ttsNarrate(){
  if(ttsI>=ttsScript.length){ttsOn=false;document.getElementById('ttsBtn').textContent='🎙️ 重播導覽';document.getElementById('ttsBtn').style.background='#8b5cf6';
    document.querySelectorAll('.tts-hl').forEach(e=>e.classList.remove('tts-hl'));return;}
  document.querySelectorAll('.tts-hl').forEach(e=>e.classList.remove('tts-hl'));
  const seg=ttsScript[ttsI];
  const el=document.querySelector(seg.el);
  if(el){el.classList.add('tts-hl');el.scrollIntoView({behavior:'smooth',block:'center'});}
  ttsSay(seg.text,()=>{if(!ttsOn)return;ttsI++;setTimeout(ttsNarrate,300);});
}
function ttsToggle2(){
  const btn=document.getElementById('ttsBtn');
  if(!ttsOn){ttsOn=true;ttsI=0;btn.textContent='⏹ 停止導覽';btn.style.background='#ef4444';ttsNarrate();}
  else{ttsOn=false;speechSynthesis.cancel();btn.textContent='🎙️ 語音導覽';btn.style.background='#8b5cf6';
    document.querySelectorAll('.tts-hl').forEach(e=>e.classList.remove('tts-hl'));}
}

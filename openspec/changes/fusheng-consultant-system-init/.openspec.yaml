name: fusheng-consultant-system-init
status: proposed
created: 2026-03-14
description: >
  富昇物流 × 企業顧問專案管理系統 — 從零建立完整的顧問專案管理平台，
  包含六大業務模組、四項 AI 輔助功能、三角色權限、文件中心與完整開發文件體系。

artifacts:
  - id: proposal
    type: proposal
    path: proposal.md
    status: pending

  - id: specs
    type: specs
    path: specs/
    status: pending
    dependencies: [proposal]

  - id: design
    type: design
    path: design.md
    status: pending
    dependencies: [proposal, specs]

  - id: tasks
    type: tasks
    path: tasks.md
    status: pending
    dependencies: [proposal, specs, design]

apply:
  requires: [proposal, specs, design, tasks]
